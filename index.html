<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zvukify</title>
  <script>
    // 🎯 TADY VŽDY JEN PŘEPIŠ ČÍSLO ZVUKU PODLE SITUACE:
    const targetSound = "166"; 

    const targetUrl = "https://www.zvukify.cz/?" + targetSound;
    const urlParams = window.location.search;
    
    // Okamžité přesměrování bez uložení do historie
    window.location.replace(targetUrl + (urlParams ? "&" + urlParams.substring(1) : ""));
  </script>
</head>
<body style="background-color: #121212; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px;">
  <p>Přesměrovávám na Zvukify...</p>
  <p style="font-size: 14px; opacity: 0.6;">
    Pokud přesměrování neproběhne, <a id="link" href="#" style="color: #2FC480; text-decoration: none; font-weight: bold;">klikni sem</a>.
  </p>
  <script>
    // Pojistka pro fallback odkaz
    document.getElementById("link").href = targetUrl + urlParams;
  </script>
</body>
</html>
