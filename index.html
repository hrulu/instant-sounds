<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Sounds</title>
    
    <script>
        // 1. 🌟 Zde zadej přesnou adresu, kde ti soundboard běží u strejdy (včetně lomítka na konci!)
        const targetUrl = "https://www.relaxhosting.cz/avening/soundboard2/";
        
        // 2. JavaScript vezme to číslo za otazníkem (např. ?223)
        const urlParams = window.location.search;
        
        // 3. Spojí to dohromady a bleskově přesměruje (vznikne https://www.relaxhosting.cz/avening/soundboard2/?223)
        window.location.replace(targetUrl + urlParams);
    </script>
</head>
<body>
    <p style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        Načítám Instant Sounds... Pokud se stránka nepřesměruje sama, 
        <a id="fallback-link" href="https://www.relaxhosting.cz/avening/soundboard2/">klikněte zde</a>.
    </p>
    <script>
        // Pojistka pro textový odkaz, aby i on v případě nouze obsahoval to číslo zvuku
        document.getElementById("fallback-link").href = targetUrl + urlParams;
    </script>
</body>
</html>
